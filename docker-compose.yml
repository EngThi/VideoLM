version: '3.8'

services:
  videolm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videolm_factory
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_TOKENS=${HF_TOKENS}
      - DATABASE_PATH=/app/server/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-flavortown_secret_2026}
    volumes:
      - ./server/data:/app/server/data
      - ./server/public/videos:/app/server/public/videos
      - ./server/cache:/app/server/cache
      - nlm_session:/root/.notebooklm-mcp-cli

volumes:
  nlm_session:
