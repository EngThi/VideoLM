version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001" # Frontend will be served from backend on this port
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY} # Add OpenRouter key
      - DATABASE_PATH=/app/data/homes.db
    volumes:
      - homes_db:/app/data

volumes:
  homes_db: